<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Kids Pro</title>
    <style>
        /* CSS CHO GIAO DIỆN CHUYÊN NGHIỆP */
        :root { --primary: #6c5ce7; --secondary: #a29bfe; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        header { background: var(--primary); color: white; width: 100%; text-align: center; padding: 20px 0; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .main-container { margin-top: 50px; display: flex; flex-direction: column; align-items: center; gap: 30px; }

        /* Card 3D Effect */
        .card { width: 320px; height: 220px; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flipped { transform: rotateY(180deg); }
        
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 25px; font-size: 32px; color: white; font-weight: bold; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 5px solid white; }
        .back { transform: rotateY(180deg); font-size: 28px; }

        /* Nút bấm điều khiển */
        .controls { display: flex; gap: 20px; }
        button { padding: 12px 25px; font-size: 18px; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; background: white; color: var(--primary); font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        button:hover { transform: translateY(-3px); background: var(--primary); color: white; }
        
        .progress { font-size: 18px; color: #636e72; }
    </style>
</head>
<body>

<header>
    <h1>🌟 ENGLISH KIDS PRO 🌟</h1>
</header>

<div class="main-container">
    <div class="progress" id="progress">Từ 1 / 4</div>

    <div class="card" onclick="flipCard()">
        <div class="card-inner" id="cardInner">
            <div class="front" id="engText" style="background-color: #2980b9;">SHARK 🦈</div>
            <div class="back" id="vieText" style="background-color: #f39c12;">CÁ MẬP</div>
        </div>
    </div>

    <div class="controls">
        <button onclick="prevCard()">Quay lại</button>
        <button onclick="nextCard()">Tiếp theo</button>
    </div>
</div>

<script>
    // DỮ LIỆU TỪ VỰNG
    const vocabularyList = [
        { eng: "Lion 🦁", vie: "Sư tử", color: "#e67e22" },
        { eng: "Elephant 🐘", vie: "Con voi", color: "#95a5a6" },
        { eng: "Monkey 🐒", vie: "Con khỉ", color: "#d35400" },
        { eng: "Shark 🦈", vie: "Cá mập", color: "#2980b9" },
        { eng: "Giraffe 🦒", vie: "Hươu cao cổ", color: "#f1c40f" }
    ];

    let currentIndex = 0;

    function updateCard() {
        const item = vocabularyList[currentIndex];
        document.getElementById('engText').innerText = item.eng;
        document.getElementById('engText').style.backgroundColor = item.color;
        document.getElementById('vieText').innerText = item.vie;
        document.getElementById('progress').innerText = `Từ ${currentIndex + 1} / ${vocabularyList.length}`;
        document.getElementById('cardInner').classList.remove('flipped');
    }

    function flipCard() {
        document.getElementById('cardInner').classList.toggle('flipped');
    }

    function nextCard() {
        currentIndex = (currentIndex + 1) % vocabularyList.length;
        updateCard();
    }

    function prevCard() {
        currentIndex = (currentIndex - 1 + vocabularyList.length) % vocabularyList.length;
        updateCard();
    }

    // Khởi tạo thẻ đầu tiên
    updateCard();
</script>

</body>
</html>
