<!DOCTYPE html>
<html>
<head>
    <title>My English App</title>
    <style>
        /* Chỗ này chứa code CSS của chúng mình */
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #e0f7fa; font-family: Arial; }
        .card { width: 300px; height: 200px; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flipped { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; justify-content: center; align-items: center; border-radius: 20px; font-size: 24px; color: white; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .front { background-color: #0288d1; }
        .back { background-color: #ffb300; transform: rotateY(180deg); }
    </style>
</head>
<body>

    <div class="card" onclick="this.querySelector('.card-inner').classList.toggle('flipped')">
        <div class="card-inner">
            <div class="front">SHARK 🦈</div>
            <div class="back">CÁ MẬP</div>
        </div>
    </div>

</body>
</html>
