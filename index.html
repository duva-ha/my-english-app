<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Kids Pro - Học Tiếng Anh Cùng Robot</title>
    <style>
        /* --- GIAO DIỆN HỆ THỐNG --- */
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --accent: #fd79a8;
            --bg: #f0f2f5;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background: var(--primary);
            color: white;
            width: 100%;
            text-align: center;
            padding: 25px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-bottom: 5px solid var(--secondary);
        }

        header h1 { margin: 0; font-size: 28px; letter-spacing: 2px; }

        .main-container {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            width: 100%;
            max-width: 400px;
        }

        /* --- HIỆU ỨNG THẺ 3D --- */
        .progress { font-size: 20px; font-weight: bold; color: #2d3436; background: white; padding: 5px 15px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .card {
            width: 340px;
            height: 240px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flipped { transform: rotateY(180deg); }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 30px;
            color: white;
            box-shadow: 0 15px 35px rgba(108, 92, 231, 0.2);
            border: 6px solid white;
        }

        .front { font-size: 38px; font-weight: 900; }
        .back { transform: rotateY(180deg); font-size: 32px; font-weight: bold; }

        /* --- NÚT BẤM VÀ LOA --- */
        .btn-speak {
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 30px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-speak:hover { background: rgba(255, 255, 255, 0.5); transform: scale(1.1); }

        .controls { display: flex; gap: 15px; margin-top: 10px; }

        .btn-nav {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            background: var(--primary);
            color: white;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.3);
        }

        .btn-nav:hover { background: var(--accent); transform: translateY(-3px); }
        .btn-nav:active { transform: translateY(0); }

        footer { margin-top: auto; padding: 20px; color: #636e72; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <h1>🚀 ENGLISH PRO FOR KIDS</h1>
</header>

<div class="main-container">
    <div class="progress" id="progress">Đang tải...</div>

    <div class="card" onclick="flipCard()">
        <div class="card-inner" id="cardInner">
            <!-- Mặt trước (Tiếng Anh) -->
            <div class="front" id="frontSide" style="background-color: #6c5ce7;">
                <span id="engWord">Hello!</span>
                <button class="btn-speak" onclick="speakText(event)">🔊</button>
            </div>
            <!-- Mặt sau (Tiếng Việt) -->
            <div class="back" id="backSide" style="background-color: #fd79a8;">
                <span id="vieWord">Xin chào!</span>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-nav" onclick="prevCard()">⬅️ Trước</button>
        <button class="btn-nav" onclick="nextCard()">Tiếp ➡️</button>
    </div>
</div>

<footer>Dự án của Lập trình viên nhí trên GitHub</footer>

<script>
    /* --- KHO DỮ LIỆU TỪ VỰNG --- */
    // Con có thể thêm bao nhiêu từ tùy thích vào đây nhé!
    const vocabularyList = [
        { eng: "Lion 🦁", vie: "Sư tử", color: "#e67e22" },
        { eng: "Elephant 🐘", vie: "Con voi", color: "#95a5a6" },
        { eng: "Monkey 🐒", vie: "Con khỉ", color: "#d35400" },
        { eng: "Shark 🦈", vie: "Cá mập", color: "#2980b9" },
        { eng: "Giraffe 🦒", vie: "Hươu cao cổ", color: "#f1c40f" },
        { eng: "Dolphin 🐬", vie: "Cá heo", color: "#00cec9" },
        { eng: "Octopus 🐙", vie: "Bạch tuộc", color: "#a29bfe" }
    ];

    let currentIndex = 0;

    /* --- CÁC HÀM XỬ LÝ --- */
    function updateCard() {
        const item = vocabularyList[currentIndex];
        
        // Cập nhật chữ và màu sắc
        document.getElementById('engWord').innerText = item.eng;
        document.getElementById('frontSide').style.backgroundColor = item.color;
        document.getElementById('vieWord').innerText = item.vie;
        
        // Cập nhật số thứ tự
        document.getElementById('progress').innerText = `Từ ${currentIndex + 1} / ${vocabularyList.length}`;
        
        // Luôn trả thẻ về mặt trước khi chuyển từ mới
        document.getElementById('cardInner').classList.remove('flipped');
    }

    function flipCard() {
        document.getElementById('cardInner').classList.toggle('flipped');
    }

    function nextCard() {
        currentIndex = (currentIndex + 1) % vocabularyList.length;
        updateCard();
    }

    function prevCard() {
        currentIndex = (currentIndex - 1 + vocabularyList.length) % vocabularyList.length;
        updateCard();
    }

    // Hàm phát âm sử dụng Robot của trình duyệt
    function speakText(event) {
        event.stopPropagation(); // Ngăn việc lật thẻ khi bấm loa
        
        const rawText = vocabularyList[currentIndex].eng;
        // Loại bỏ biểu tượng Emoji để Robot không đọc chữ "Lion emoji"
        const cleanText = rawText.replace(/[\u1000-\uFFFF]+/g, "").trim(); 

        const synth = window.speechSynthesis;
        const utterance = new SpeechSynthesisUtterance(cleanText);
        
        utterance.lang = 'en-US'; // Giọng Mỹ
        utterance.rate = 0.8;    // Tốc độ (hơi chậm một chút để dễ nghe)
        utterance.pitch = 1.1;   // Giọng cao hơn một chút cho vui nhộn

        synth.speak(utterance);
    }

    // Khởi động trang web
    window.onload = updateCard;
</script>

</body>
</html>
